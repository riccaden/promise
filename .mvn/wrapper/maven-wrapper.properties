# =============================================================================
# Maven Wrapper Konfiguration (.mvn/wrapper/maven-wrapper.properties)
# Der Maven Wrapper (mvnw / mvnw.cmd) ermöglicht das Bauen des Projekts
# ohne lokal installiertes Maven – die korrekte Version wird automatisch
# heruntergeladen. Dies stellt sicher, dass alle Entwickler und der
# Docker-Build dieselbe Maven-Version verwenden.
# =============================================================================

# URL zur Maven-Distribution (Binary ZIP) – wird beim ersten Aufruf von ./mvnw heruntergeladen
distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.4/apache-maven-3.9.4-bin.zip
# URL zum Maven Wrapper JAR selbst – wird benötigt, wenn das Wrapper-JAR fehlt
wrapperUrl=https://repo.maven.apache.org/maven2/org/apache/maven/wrapper/maven-wrapper/3.2.0/maven-wrapper-3.2.0.jar
