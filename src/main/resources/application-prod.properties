# =============================================================================
# Oblivio / PROMISE Framework – Produktionskonfiguration (Spring Boot)
# Wird auf Railway deployed; Datenbank ist Supabase PostgreSQL.
# Alle sensiblen Werte werden ueber Umgebungsvariablen injiziert.
# =============================================================================

# --- Datenbank: Supabase PostgreSQL-Verbindung --------------------------------
# Die SPRING_DATASOURCE_*-Umgebungsvariablen werden von Railway gesetzt.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# --- Hibernate / JPA-Einstellungen -------------------------------------------
# PostgreSQL-Dialekt fuer Supabase; ddl-auto=update synchronisiert Schema automatisch
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# SQL-Logging in Produktion deaktiviert, um Log-Rauschen zu vermeiden
spring.jpa.show-sql=false

# --- HikariCP Connection-Pool-Konfiguration -----------------------------------
# Maximal 10 gleichzeitige DB-Verbindungen; mindestens 2 im Leerlauf vorhalten
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
# Timeout in Millisekunden, bevor eine Verbindungsanfrage fehlschlaegt (30 s)
spring.datasource.hikari.connection-timeout=30000

# --- Supabase PgBouncer-Kompatibilitaet --------------------------------------
# PgBouncer unterstuetzt keine Server-side Prepared Statements;
# prepareThreshold=0 deaktiviert diese im PostgreSQL JDBC-Treiber.
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# --- Server-Port --------------------------------------------------------------
# Railway setzt die PORT-Umgebungsvariable; Fallback auf 8080 fuer lokale Tests
server.port=${PORT:8080}

# --- Logging-Konfiguration ----------------------------------------------------
# Nur WARN fuer Framework-Pakete, INFO fuer Oblivio-Anwendungslogik
# Reduziert Log-Volumen, um Railway-Rate-Limits (500 logs/s) einzuhalten
logging.level.root=WARN
logging.level.org.springframework.web=WARN
logging.level.ch.zhaw.statefulconversation=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework.orm.jpa=WARN

# --- Spring Boot Actuator (Health Checks) -------------------------------------
# Nur health- und info-Endpoints exponiert; Details nur fuer autorisierte Nutzer
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized