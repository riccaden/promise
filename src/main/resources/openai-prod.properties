# =============================================================================
# Oblivio / PROMISE Framework – OpenAI-Produktionskonfiguration
# Wird in Produktion (Railway) geladen. Der API-Key kommt aus der Umgebungsvariable.
# =============================================================================

# --- Provider-Auswahl --------------------------------------------------------
# "openai" = direkte OpenAI-API; Alternative waere "azureopenai"
openai.openaivsazureopenai = openai

# --- Chat Completions API (GPT-4o) -------------------------------------------
# Endpoint fuer textbasierte PROMISE-Konversationen (Stateful Conversation Engine)
openai.url = https://api.openai.com/v1/chat/completions
# GPT-4o als Hauptmodell fuer alle PROMISE-Bloecke (Biograf, Zusammenfassung etc.)
openai.model = gpt-4o
# API-Key wird aus der OPENAI_KEY-Umgebungsvariable injiziert (nicht hartcodiert)
openai.key = ${OPENAI_KEY}

# --- Realtime API (Sprach-zu-Sprach) ------------------------------------------
# Modell fuer WebRTC-basierte Echtzeit-Sprachinteraktion
openai.realtimeModel = gpt-4o-realtime-preview-2024-12-17
# Endpoint zum Erstellen von Realtime-Sessions (Server-seitig)
openai.realtimeSessionUrl = https://api.openai.com/v1/realtime/sessions
# WebRTC SDP-Austausch-Endpoint fuer Client-seitige Verbindung
openai.realtimeUrl = https://api.openai.com/v1/realtime
